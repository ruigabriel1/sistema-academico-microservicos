# Porta em que este microserviço irá rodar (diferente dos outros para execução simultânea)
server.port=8083

# Nome do serviço
spring.application.name=ms-matricula

# =============================================
# Configurações de conexão com o banco MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/matricula_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# Configurações do Hibernate (ORM)
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# URLs dos outros microserviços (comunicação REST)
# =============================================
# Endereço base do ms-aluno — usado pelo RestTemplate para buscar dados de alunos
ms.aluno.url=http://localhost:8081
# Endereço base do ms-curso — usado pelo RestTemplate para buscar dados de cursos
ms.curso.url=http://localhost:8082

# Ignora campos desconhecidos ao desserializar respostas JSON dos outros serviços
spring.jackson.deserialization.fail-on-unknown-properties=false
