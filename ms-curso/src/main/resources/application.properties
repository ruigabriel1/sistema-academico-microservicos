# Porta em que este microserviço irá rodar (diferente dos outros para execução simultânea)
server.port=8082

# Nome do serviço (útil para logs e identificação)
spring.application.name=ms-curso

# =============================================
# Configurações de conexão com o banco MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/curso_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# Configurações do Hibernate (ORM)
# =============================================
# update: atualiza o schema automaticamente com base nas entidades mapeadas
spring.jpa.hibernate.ddl-auto=update
# Exibe as queries SQL executadas no console (útil para desenvolvimento)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
